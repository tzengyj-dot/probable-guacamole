<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="健身💪">
<meta name="theme-color" content="#0e0e0e">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230e0e0e'/><stop offset='1' stop-color='%231a1a1a'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><rect x='8' y='8' width='84' height='84' rx='18' fill='none' stroke='%23d4ff4e' stroke-width='2' opacity='.3'/><text y='52' x='50' font-size='46' text-anchor='middle' dominant-baseline='middle'>💪</text><text y='82' x='30' font-size='20' text-anchor='middle'>🐬</text><text y='82' x='70' font-size='20' text-anchor='middle'>🦥</text></svg>">
<title>居家健身</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--surface:#161616;--card:#1c1c1c;--border:#2a2a2a;--accent:#d4ff4e;--accent2:#ff6b35;--accent3:#4ecdc4;--text:#f0f0f0;--muted:#888;--warm:#ffb347;--green:#97C459;--green-dark:#27500A;--green-bg:#EAF3DE}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hdr{padding:env(safe-area-inset-top,16px) 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(env(safe-area-inset-top),16px)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1}
.hdr-btns{display:flex;gap:6px}
.timer-btn{font-size:12px;padding:7px 13px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;color:var(--accent);font-family:'DM Mono',monospace}
.user-switch-btn{height:30px;padding:0 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.5px;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap}
.user-switch-btn.aura{border-color:#ff8fab;background:rgba(255,143,171,.12);color:#ff8fab}
.user-switch-btn.yinjie{border-color:#4ecdc4;background:rgba(78,205,196,.12);color:#4ecdc4}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{text-align:center;padding:6px 2px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.wday:active{background:#252525}
.wday.today{border-color:var(--green);background:rgba(151,196,89,0.1)}
.wday.has-workout{border-color:#333}
.wday.has-workout:hover{border-color:var(--accent);background:rgba(212,255,78,.05)}
.wday.selected-week{border-color:var(--accent);background:rgba(212,255,78,.08)}
.wday.rest-day{opacity:.4;cursor:default}
.wday-label{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:2px;font-family:'DM Mono',monospace}
.wday-date{font-size:11px;font-weight:500}
.wday.today .wday-date{color:var(--green)}
.wday.selected-week .wday-date{color:var(--accent)}
.wday-dot{width:5px;height:5px;border-radius:50%;background:var(--green);margin:3px auto 0}
.wday-pip{width:5px;height:5px;border-radius:50%;background:var(--accent);margin:3px auto 0;opacity:.6}
.day-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.day-tab.active{background:rgba(212,255,78,.1);border-color:var(--accent);color:var(--accent);font-weight:500}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.scroll-area::-webkit-scrollbar{display:none}
.workout-hdr{padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.workout-title-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.workout-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1}
.workout-sub{font-size:12px;color:var(--muted);margin-top:3px}
.workout-mins-num{font-family:'Bebas Neue',sans-serif;font-size:28px;text-align:right;line-height:1}
.workout-mins-label{font-size:10px;color:var(--muted);text-align:right;font-family:'DM Mono',monospace}
.prog-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px}
.prog-bar{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.prog-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;font-family:'DM Mono',monospace}
.section-hdr{padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);border-top:5px solid var(--bg);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.section-hdr-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.s-badge{display:inline-block;font-size:10px;padding:2px 10px;border-radius:3px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.bw{background:rgba(255,179,71,.15);color:var(--warm)}
.bm{background:rgba(212,255,78,.1);color:var(--accent)}
.bh{background:rgba(255,107,53,.15);color:var(--accent2)}
.bc{background:rgba(78,205,196,.12);color:var(--accent3)}
.s-time{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.s-note{font-size:11px;color:var(--muted);margin-top:4px;width:100%}
.hiit-timer-btn{font-size:11px;padding:4px 10px;border:1px solid var(--accent2);border-radius:6px;background:rgba(255,107,53,.1);cursor:pointer;color:var(--accent2);font-family:'DM Mono',monospace;flex-shrink:0}

/* Exercise rows */
.ex-row{border-bottom:1px solid var(--border);background:var(--card);-webkit-user-select:none;user-select:none}
.ex-row-main{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;transition:background .1s}
.ex-row.chk .ex-row-main{background:#111}
.ex-chk{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;cursor:pointer}
.ex-chk.on{background:var(--green);border-color:var(--green)}
.ex-chk.on::after{content:'✓';font-size:11px;color:#0e0e0e;font-weight:900}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:400;transition:all .15s;cursor:pointer}
.ex-row.chk .ex-name{color:#555;text-decoration:line-through}
.ex-brief{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}
.ex-row.chk .ex-brief{color:#444}
.ex-sets-col{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ex-sets{font-size:12px;color:var(--muted);text-align:right;font-family:'DM Mono',monospace}
.ex-row.chk .ex-sets{color:#444}
/* Set counter tap area */
.set-counter{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 0}
.set-counter-track{display:flex;gap:3px}
.set-pip{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .2s;flex-shrink:0}
.set-pip.done{background:var(--green);border-color:var(--green)}
.set-pip.done-last{background:var(--accent);border-color:var(--accent)}
.set-counter-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);min-width:24px;text-align:right}
.set-counter-label.full{color:var(--green)}
.ex-expand-icon{font-size:10px;color:var(--muted);margin-left:6px;transition:transform .2s;display:inline-block}
.ex-expand-icon.open{transform:rotate(180deg)}

/* Expanded detail panel */
.ex-detail{display:none;padding:0 16px 14px 48px;background:#111;border-top:1px solid #222}
.ex-detail.open{display:block}
.ex-detail-inner{padding-top:12px}
.ex-d-section{margin-bottom:10px}
.ex-d-label{font-size:9px;letter-spacing:1.5px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;margin-bottom:5px}
.ex-d-text{font-size:12px;color:#ccc;line-height:1.6}
.ex-d-cues{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.ex-d-cue{font-size:12px;color:#bbb;display:flex;gap:6px;line-height:1.5}
.ex-d-cue-icon{flex-shrink:0;font-size:13px}
.ex-d-muscles{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.ex-d-muscle{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--muted);font-family:'DM Mono',monospace}
.ex-d-avoid{font-size:11px;color:#ff6b6b;margin-top:4px;display:flex;gap:5px;align-items:flex-start}

.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 16px;padding-bottom:max(env(safe-area-inset-bottom),10px);background:linear-gradient(transparent,var(--bg) 30%);display:flex;gap:8px}
.btn-reset{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);font-family:'Noto Sans TC',sans-serif}
.btn-done{flex:2;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.btn-done.ready{background:var(--accent);border-color:var(--accent);color:#0e0e0e}

/* Rest Timer Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.timer-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 32px;text-align:center;min-width:260px}
.tl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
.tring{margin:0 auto 16px;width:110px;height:110px;position:relative}
.tsvg{transform:rotate(-90deg)}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;color:var(--text)}
.tnum.go{color:var(--accent)}
.tpresets{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.tp{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}
.tp.on{background:rgba(212,255,78,.1);border-color:var(--accent);color:var(--accent)}
.tbtns{display:flex;gap:8px;justify-content:center}
.tctrl{padding:9px 22px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);font-family:'Noto Sans TC',sans-serif}
.tclose{padding:9px 22px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:'Noto Sans TC',sans-serif}

/* Auto Rest Popup */
.rest-popup{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;z-index:90;display:flex;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.rest-popup-left{flex:1}
.rest-popup-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.rest-popup-exname{font-size:13px;color:var(--text);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-popup-intensity{font-size:11px;color:var(--muted)}
.rest-popup-ring{width:52px;height:52px;position:relative;flex-shrink:0}
.rest-popup-ring svg{transform:rotate(-90deg)}
.rest-popup-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}
.rest-popup-skip{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:12px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;flex-shrink:0}

/* HIIT Timer Overlay */
.hiit-overlay{position:fixed;inset:0;background:#0a0a0a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.hiit-phase{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;margin-bottom:8px;transition:color .3s}
.hiit-phase.work{color:var(--accent2)}
.hiit-phase.rest{color:var(--accent3)}
.hiit-ex-name{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;text-align:center;padding:0 24px;margin-bottom:6px;line-height:1.1}
.hiit-next{font-size:12px;color:var(--muted);margin-bottom:28px;font-family:'DM Mono',monospace}
.hiit-ring{margin:0 auto 24px;width:160px;height:160px;position:relative}
.hiit-ring svg{transform:rotate(-90deg)}
.hiit-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:2px}
.hiit-round-info{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:24px;letter-spacing:1px}
.hiit-prog-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.hiit-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.hiit-dot.done{background:var(--green)}
.hiit-dot.current{background:var(--accent2);transform:scale(1.2)}
.hiit-btns{display:flex;gap:10px}
.hiit-btn{padding:12px 28px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;color:var(--text);font-family:'Noto Sans TC',sans-serif}
.hiit-btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:500}
.hiit-btn.rest-c{background:rgba(78,205,196,.15);border-color:var(--accent3);color:var(--accent3)}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;border-top:1px solid var(--border);background:var(--bg);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-size:10px;font-family:'Noto Sans TC',sans-serif;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn-icon{font-size:20px;line-height:1}

/* Page system */
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:120px;height:calc(100vh - 130px);margin-top:0}
.page::-webkit-scrollbar{display:none}
.page.active{display:block}

/* History page */
.hist-section{padding:16px}
.hist-month-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);margin-bottom:12px}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.hm-cell{aspect-ratio:1;border-radius:4px;background:var(--border);cursor:pointer;transition:all .15s;position:relative}
.hm-cell.has-data{background:rgba(151,196,89,0.25)}
.hm-cell.has-data:active{background:rgba(151,196,89,0.5)}
.hm-cell.today-cell{outline:2px solid var(--green);outline-offset:1px}
.hist-day-detail{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.hist-day-title{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.hist-day-badge{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(151,196,89,0.15);color:var(--green);font-family:'DM Mono',monospace}
.hist-ex-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #222;font-size:12px}
.hist-ex-row:last-child{border-bottom:none}
.hist-ex-name{color:#bbb;flex:1}
.hist-ex-sets{font-family:'DM Mono',monospace;color:var(--green);font-size:11px}
.hist-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* Edit overlay */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.edit-sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 20px max(env(safe-area-inset-bottom),20px);max-height:80vh;overflow-y:auto}
.edit-sheet::-webkit-scrollbar{display:none}
.edit-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px}
.edit-field{margin-bottom:14px}
.edit-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.edit-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none}
.edit-input:focus{border-color:var(--accent)}
.edit-btns{display:flex;gap:8px;margin-top:20px}
.edit-save{flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#0e0e0e;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.edit-cancel{flex:1;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.edit-btn-inline{font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;margin-left:8px;vertical-align:middle}

/* Assessment */
.assess-opt{width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;font-size:14px;color:var(--text);font-family:'Noto Sans TC',sans-serif;text-align:left;transition:all .15s}
.assess-opt:active{background:rgba(212,255,78,.1);border-color:var(--accent)}
.assess-opt.sel{background:rgba(212,255,78,.12);border-color:var(--accent);color:var(--accent)}

/* Countdown */
#cdNum{color:var(--accent)}
#cdNum.go{color:var(--accent2);font-size:120px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">居家健身 💪</div>
      <div class="hdr-btns">
        <button class="timer-btn" onclick="openTimer()">⏱ 休息計時</button>
        <button class="user-switch-btn" id="userSwitchBtn" onclick="switchUser()"></button>
      </div>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>

  <!-- Workout Page -->
  <div class="page active" id="pageWorkout">
    <div id="workoutContent"></div>
  </div>

  <!-- History Page -->
  <div class="page" id="pageHistory">
    <div class="hist-section" id="histContent"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="navWorkout" onclick="switchPage('workout')">
      <span class="nav-btn-icon">🏋️</span>訓練
    </button>
    <button class="nav-btn" id="navHistory" onclick="switchPage('history')">
      <span class="nav-btn-icon">📊</span>紀錄
    </button>
  </div>

  <!-- Action Bar -->
  <div style="position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:6px 16px;background:linear-gradient(transparent,var(--bg) 40%);display:flex;gap:8px;z-index:40" id="actionBar">
    <button class="btn-reset" onclick="resetChecks()">重置</button>
    <button class="btn-done" id="btnDone" onclick="markDone()">完成訓練</button>
  </div>
</div>

<!-- Body Assessment Overlay -->
<div class="overlay" id="assessOverlay" style="display:none">
  <div class="timer-box" style="min-width:300px">
    <div class="tl">今日狀態評估</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center">訓練前先評估今天的身體狀況</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px" id="assessOptions">
      <button class="assess-opt" onclick="selectAssess(1)">😴 很疲憊，撐不住</button>
      <button class="assess-opt" onclick="selectAssess(2)">😕 有點累，狀態不好</button>
      <button class="assess-opt" onclick="selectAssess(3)">😐 普通，正常發揮</button>
      <button class="assess-opt" onclick="selectAssess(4)">😊 不錯，狀態良好</button>
      <button class="assess-opt" onclick="selectAssess(5)">💪 超好！全力以赴</button>
    </div>
    <button class="tclose" onclick="closeAssessment()">取消</button>
  </div>
</div>

<!-- Countdown Overlay (3-2-1-GO) -->
<div class="overlay" id="countdownOverlay" style="display:none;background:rgba(0,0,0,.92)">
  <div style="text-align:center">
    <div style="font-size:14px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:2px;margin-bottom:16px" id="cdExName"></div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:140px;line-height:1;letter-spacing:4px;transition:all .15s" id="cdNum">3</div>
    <div style="font-size:13px;color:var(--muted);margin-top:16px">準備好姿勢！</div>
  </div>
</div>

<!-- Rest Timer -->
<div class="overlay" id="timerOverlay" style="display:none">
  <div class="timer-box">
    <div class="tl">休息計時器</div>
    <div class="tring">
      <svg class="tsvg" width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#2a2a2a" stroke-width="7"/>
        <circle id="tarc" cx="55" cy="55" r="46" fill="none" stroke="#d4ff4e" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="289.0" stroke-dashoffset="0"/>
      </svg>
      <div class="tnum" id="tnum">60</div>
    </div>
    <div class="tpresets">
      <button class="tp" onclick="setPreset(30)">30s</button>
      <button class="tp on" onclick="setPreset(60)">60s</button>
      <button class="tp" onclick="setPreset(90)">90s</button>
    </div>
    <div class="tbtns">
      <button class="tctrl" id="tctrl" onclick="toggleTimer()">暫停</button>
      <button class="tclose" onclick="closeTimer()">關閉</button>
    </div>
  </div>
</div>

<!-- Auto Rest Popup -->
<div class="rest-popup" id="restPopup" style="display:none">
  <div class="rest-popup-left">
    <div class="rest-popup-label">組間休息</div>
    <div class="rest-popup-exname" id="restPopupName"></div>
    <div class="rest-popup-intensity" id="restPopupIntensity"></div>
  </div>
  <div class="rest-popup-ring">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="20" fill="none" stroke="#2a2a2a" stroke-width="4"/>
      <circle id="restPopupArc" cx="26" cy="26" r="20" fill="none" stroke="#d4ff4e" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="125.7" stroke-dashoffset="0"/>
    </svg>
    <div class="rest-popup-num" id="restPopupNum">60</div>
  </div>
  <button class="rest-popup-skip" onclick="skipRest()">跳過</button>
</div>

<!-- HIIT Timer -->
<div class="hiit-overlay" id="hiitOverlay" style="display:none">
  <div class="hiit-phase" id="hiitPhase">準備</div>
  <div class="hiit-ex-name" id="hiitExName">準備開始</div>
  <div class="hiit-next" id="hiitNext"></div>

  <div class="hiit-btns">
    <button class="hiit-btn" id="hiitCtrl" onclick="toggleHiit()">暫停</button>
    <button class="hiit-btn" onclick="closeHiit()">結束</button>
  </div>
</div>

// ─────────────── USER SYSTEM ───────────────
const USERS={
  yinjie:{name:"Jay",emoji:"🐬",color:"#4ecdc4",WD:null},
  aura:{name:"Aurola",emoji:"🦥",color:"#ff8fab",WD:WD_AURA}
};

const SCHED={0:null,1:1,2:2,3:null,4:4,5:5,6:null};
const BMAP={w:"bw",m:"bm",h:"bh",c:"bc"};
let currentUser="yinjie";
let WD=null;
let activeDay, checks={}, completed={}, expanded={}, setProgress={};
let history={};

const todayDOW=new Date().getDay(); // must be before initUser

function initUser(){
  USERS.yinjie.WD=WD_YINJIE;
  WD=USERS[currentUser].WD;
  const prefix=currentUser+"_";
  try{completed=JSON.parse(localStorage.getItem(prefix+"wk_done")||"{}");}catch{}
  try{history=JSON.parse(localStorage.getItem(prefix+"wk_history")||"{}");}catch{}
  checks={};expanded={};setProgress={};
  // Default to today's workout if today is a training day, else first training day
  activeDay=SCHED[todayDOW]||1;
  assessedToday=false;
  const btn=document.getElementById("userSwitchBtn");
  const u=USERS[currentUser];
  btn.innerHTML=`<span>${u.emoji}</span><span>${u.name}</span><span style="opacity:.4;font-size:9px">⇄</span>`;
  btn.className="user-switch-btn "+currentUser;
  renderWeek();renderTabs();renderWorkout();
}

function switchUser(){
  currentUser=currentUser==="yinjie"?"aura":"yinjie";
  initUser();
}

function saveHistory(){
  try{localStorage.setItem(currentUser+"_wk_history",JSON.stringify(history));}catch{}
}

function markDone(){
  const all=getKeys();
  if(all.filter(k=>checks[k]).length<all.length)return;
  const dk=new Date().toISOString().split("T")[0];
  completed[dk]=activeDay;
  const exProgress={};
  all.forEach(k=>{exProgress[k]=setProgress[k]||1;});
  history[dk]={dayKey:activeDay,exProgress};
  saveHistory();
  try{localStorage.setItem(currentUser+"_wk_done",JSON.stringify(completed));}catch{}
  renderWeek();
}

// ─────────────── WEEK / DATES ───────────────
function weekDates(){
  const now=new Date(),dow=now.getDay();
  return Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()-dow+i);return d;});
}

function renderWeek(){
  const dates=weekDates();
  document.getElementById("weekGrid").innerHTML=dates.map((d,i)=>{
    const dk=d.toISOString().split("T")[0];
    const done=completed[dk];
    const isToday=i===todayDOW;
    const wdKey=SCHED[i]; // workout day key for this weekday
    const hasWorkout=wdKey!==null;
    const isSelected=hasWorkout&&activeDay==wdKey;
    const classes=["wday",isToday?"today":"",hasWorkout?"has-workout":"rest-day",isSelected?"selected-week":""].filter(Boolean).join(" ");
    const onclick=hasWorkout?`switchDay(${wdKey})`:"";
    return`<div class="${classes}" ${onclick?`onclick="${onclick}"`:""}">
      <div class="wday-label">${["日","一","二","三","四","五","六"][i]}</div>
      <div class="wday-date">${d.getDate()}</div>
      ${done?'<div class="wday-dot"></div>':hasWorkout&&!isToday?'<div class="wday-pip"></div>':""}
    </div>`;
  }).join("");
}

function renderTabs(){
  document.getElementById("dayTabs").innerHTML=Object.entries(WD).map(([k,w])=>
    `<button class="day-tab${activeDay==k?" active":""}" onclick="switchDay(${k})">${w.e} ${w.title}</button>`
  ).join("");
}

// ─────────────── EXERCISE RENDERING ───────────────
function getKeys(){
  const w=WD[activeDay],keys=[];
  w.s.forEach((sec,si)=>sec.exs.forEach((_,ei)=>keys.push(`${activeDay}-${si}-${ei}`)));
  return keys;
}

// Parse total sets from sets string: "3×10" → 3, "4×15" → 4, "×15圈" → 1, "30秒×2" → 2, "30秒×每側" → 2, "40秒" → 1, "2分鐘" → 1
function parseTotalSets(setsStr){
  // "N×每側" or "N×每腳" → treat as 2 (left + right)
  if(/×每側|×每腳/.test(setsStr)){
    const m=setsStr.match(/(\d+)/);
    return m?2:2;
  }
  // "4×12" → 4
  const frontMatch=setsStr.match(/^(\d+)×/);
  if(frontMatch)return parseInt(frontMatch[1]);
  // "×15圈" or "×10次" → 1 (single set)
  if(setsStr.startsWith("×"))return 1;
  // time-based single sets
  return 1;
}

function renderWorkout(){
  const w=WD[activeDay];
  const all=getKeys(),done=all.filter(k=>checks[k]).length,total=all.length;
  const pct=total>0?Math.round(done/total*100):0;
  let html=`<div class="workout-hdr">
    <div class="workout-title-row">
      <div><div class="workout-name">${w.e} ${w.title}</div><div class="workout-sub">${w.sub}</div></div>
      <div><div class="workout-mins-num">${w.m}</div><div class="workout-mins-label">MIN</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-label"><span>進度</span><span>${done}/${total}</span></div>
  </div>`;

  w.s.forEach((sec,si)=>{
    const isHIIT=sec.t==="h";
    html+=`<div class="section-hdr">
      <div class="section-hdr-left">
        <span class="s-badge ${BMAP[sec.t]}">${sec.l}</span>
        ${sec.d?`<span class="s-time">${sec.d}</span>`:""}
      </div>
      ${isHIIT?`<button class="hiit-timer-btn" onclick="openHiit(${si})">▶ HIIT 計時器</button>`:""}
      ${sec.note?`<div class="s-note">${sec.note}</div>`:""}
    </div>`;

    sec.exs.forEach((ex,ei)=>{
      const key=`${activeDay}-${si}-${ei}`;
      const ck=checks[key],isOpen=expanded[key];
      const totalSets=parseTotalSets(ex.s);
      const doneSets=setProgress[key]||0;
      const isHIITsec=sec.t==="h";

      // Build pip dots for set counter
      let pipsHtml="";
      if(!isHIITsec&&totalSets>1){
        pipsHtml=Array.from({length:totalSets},(_,i)=>{
          const pipClass=i<doneSets?(i===totalSets-1&&doneSets===totalSets?"set-pip done-last":"set-pip done"):"set-pip";
          return`<div class="${pipClass}"></div>`;
        }).join("");
      }
      const counterLabel=totalSets>1?(ck?`<span class="set-counter-label full">✓</span>`:`<span class="set-counter-label${doneSets===totalSets?" full":""}">${doneSets}/${totalSets}</span>`):"";

      html+=`<div class="ex-row${ck?" chk":""}" id="exrow-${key}">
        <div class="ex-row-main">
          <div class="ex-chk${ck?" on":""}" onclick="toggleExpand('${key}')"></div>
          <div class="ex-info" onclick="toggleExpand('${key}')">
            <div class="ex-name">${ex.n} <span class="ex-expand-icon${isOpen?" open":""}">▾</span></div>
            ${ex.brief?`<div class="ex-brief">${ex.brief}</div>`:""}
          </div>
          <div class="ex-sets-col">
            <div class="ex-sets">${ex.s}</div>

            ${ex.muscles?`<div class="ex-d-section"><div class="ex-d-label">主要肌群</div><div class="ex-d-muscles">${ex.muscles.map(m=>`<span class="ex-d-muscle">${m}</span>`).join("")}</div></div>`:""}
            ${ex.cues?`<div class="ex-d-section"><div class="ex-d-label">動作要點</div><div class="ex-d-cues">${ex.cues.map(c=>{const parts=c.split(" ");const icon=parts[0];const text=parts.slice(1).join(" ");return`<div class="ex-d-cue"><span class="ex-d-cue-icon">${icon}</span><span>${text}</span></div>`;}).join("")}</div></div>`:""}
            ${ex.avoid?`<div class="ex-d-avoid">⚠️ <span>${ex.avoid}</span></div>`:""}

// ─────────────── 3-2-1 COUNTDOWN ───────────────
let cdInterval=null;
let cdCallback=null;

function startCountdown(exName, callback){
  cdCallback=callback;
  let count=3;
  document.getElementById("cdExName").textContent=exName;
  const numEl=document.getElementById("cdNum");
  numEl.textContent="3";
  numEl.className="";
  document.getElementById("countdownOverlay").style.display="flex";

  playSound("tick");

  cdInterval=setInterval(()=>{
    count--;
    if(count>0){
      numEl.textContent=count;
      numEl.className="";
      playSound("tick");
    } else {
      numEl.textContent="GO!";
      numEl.className="go";
      playSound("go");
      setTimeout(()=>{
        document.getElementById("countdownOverlay").style.display="none";
        clearInterval(cdInterval);
        if(cdCallback)cdCallback();
      },600);
    }
  },1000);
}
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new AudioCtx();return audioCtx;}

function playSound(type){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==="rest"){
      // Two-tone "ding ding" — rest starting
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.setValueAtTime(1100,ctx.currentTime+0.12);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.35);
    } else if(type==="go"){
      // Rising "go!" tone — time to move
      o.frequency.setValueAtTime(660,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(1320,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.35,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4);
    } else if(type==="tick"){
      // Soft tick for last 5 seconds
      o.frequency.setValueAtTime(1000,ctx.currentTime);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.08);
    }
  }catch(e){}
}

// ─────────────── LONG PRESS TO UNDO SET ───────────────
let longPressTimer=null;
function startLongPress(key,totalSets){
  longPressTimer=setTimeout(()=>{
    removeSet(key,totalSets);
  },600);
}
function cancelLongPress(){
  clearTimeout(longPressTimer);
}

function removeSet(key,totalSets){
  const current=setProgress[key]||0;
  if(current===0)return;
  const wasDone=checks[key];
  checks[key]=false;
  setProgress[key]=current-1;
  skipRest();
  if(wasDone){
    renderWorkout();
    updateProgress();
    updateBtn();
  } else {
    renderPips(key,current-1,totalSets,false);
    updateProgress();
    updateBtn();
  }
  // brief haptic-like flash
  const row=document.getElementById(`exrow-${key}`);
  if(row){row.style.opacity="0.5";setTimeout(()=>row.style.opacity="1",200);}
}
// Called when user taps the set counter area
function addSet(key,secType,totalSets){
  if(checks[key])return;
  // Must assess before starting
  if(!assessedToday){openAssessment();return;}
  const current=setProgress[key]||0;
  const next=current+1;
  const w=WD[activeDay];
  const parts=key.split("-"),si=parseInt(parts[1]),ei=parseInt(parts[2]);
  const ex=w.s[si].exs[ei];

  // Trigger 3-2-1 countdown first, then rest timer after
  startCountdown(ex.n, ()=>{
    if(next<totalSets){
      setProgress[key]=next;
      const isHigh=HIGH_INTENSITY_KW.some(k=>ex.n.includes(k));
      const dur=secType==="w"?15:isHigh?90:60;
      playSound("rest");
      triggerTimer({
        duration:dur,
        mode:"rest",
        label:secType==="w"?"熱身組間 · 15秒":`第 ${next}/${totalSets} 組完成 · ${dur}秒休息`
      },ex.n);
      renderPips(key,next,totalSets,false);
    } else {
      setProgress[key]=totalSets;
      checks[key]=true;
      const sec=w.s[si];
      const config=getTimerConfig(sec.t,ex.n,ex.s,true);
      playSound("rest");
      triggerTimer(config,ex.n);
      renderWorkout();
      updateProgress();
      updateBtn();
    }
  });
}

function renderPips(key,doneSets,totalSets,isDone){
  const row=document.getElementById(`exrow-${key}`);
  if(!row)return;
  const track=row.querySelector(".set-counter-track");
  const label=row.querySelector(".set-counter-label");
  if(track){
    track.innerHTML=Array.from({length:totalSets},(_,i)=>{
      const pipClass=i<doneSets?(i===totalSets-1&&doneSets===totalSets?"set-pip done-last":"set-pip done"):"set-pip";
      return`<div class="${pipClass}"></div>`;
    }).join("");
  }
  if(label){
    label.textContent=isDone?"✓":`${doneSets}/${totalSets}`;
    label.className="set-counter-label"+(doneSets===totalSets?" full":"");
  }
}

// ─────────────── AUTO REST / HOLD POPUP ───────────────
// w=warmup: 15s rest between exercises (keep warm)
// m=main: 60s rest (90s for high intensity)
// c=cooldown: hold timer = actual stretch duration from sets text
// h=hiit: skip (has own timer)
const HIGH_INTENSITY_KW=["波比","跳躍深蹲","弓步跳","高抬腿"];
const REST_CIRC=2*Math.PI*20;
let restSec=0,restPreset=60,restInterval=null,restMode="rest";

function parseHoldSec(setsStr){
  const minMatch=setsStr.match(/(\d+)分鐘/);
  if(minMatch)return parseInt(minMatch[1])*60;
  const secMatch=setsStr.match(/(\d+)秒/);
  if(secMatch)return parseInt(secMatch[1]);
  return 0;
}

function getTimerConfig(secType,exName,setsStr,isLastSet=false){
  if(secType==="h")return null;
  if(secType==="c"){
    const hold=parseHoldSec(setsStr);
    if(hold>0)return{duration:hold,mode:"hold",label:`保持伸展 ${hold}秒`};
    return null;
  }
  if(secType==="w"){
    if(isLastSet)return{duration:20,mode:"rest",label:"熱身動作完成 · 換下一個"};
    return{duration:15,mode:"rest",label:"熱身組間休息 · 15秒"};
  }
  // main training
  const isHigh=HIGH_INTENSITY_KW.some(k=>exName.includes(k));
  const dur=isHigh?90:60;
  if(isLastSet)return{duration:isHigh?120:90,mode:"next",label:`全部組完成！換下一個動作 · ${isHigh?120:90}秒`};
  return{duration:dur,mode:"rest",label:isHigh?"高強度 · 90秒組間休息":"一般強度 · 60秒組間休息"};
}

function triggerTimer(config,exName){
  if(!config)return;
  clearInterval(restInterval);
  restPreset=config.duration;restSec=config.duration;restMode=config.mode;
  document.getElementById("restPopupName").textContent=exName;
  document.getElementById("restPopupIntensity").textContent=config.label;
  // colors: hold=teal, next=warm orange, rest=yellow
  const color=restMode==="hold"?"#4ecdc4":restMode==="next"?"#ffb347":"#d4ff4e";
  document.getElementById("restPopupArc").style.stroke=color;
  document.getElementById("restPopupNum").style.color=color;
  document.getElementById("restPopup").style.display="flex";
  renderRestPopup();
  restInterval=setInterval(()=>{
    if(restSec>1){
      restSec--;
      if(restSec<=5)playSound("tick");
      renderRestPopup();
    }
    else{playSound("go");skipRest();}
  },1000);
}

function renderRestPopup(){
  const pct=restSec/restPreset;
  document.getElementById("restPopupArc").style.strokeDashoffset=REST_CIRC*(1-pct);
  const n=document.getElementById("restPopupNum");
  if(restSec===0){n.textContent="✓";return;}
  n.textContent=restSec;
  if(restSec<=5){
    n.style.color="#ff6b35";
    document.getElementById("restPopupArc").style.stroke="#ff6b35";
  }
}

function skipRest(){
  clearInterval(restInterval);
  document.getElementById("restPopup").style.display="none";
}

  const all=getKeys(),done=all.filter(k=>checks[k]).length,total=all.length;

// ─────────────── REST TIMER ───────────────
let tSec=60,tPreset=60,tRunning=true,tInterval=null;
const CIRC=2*Math.PI*46;

function openTimer(){document.getElementById("timerOverlay").style.display="flex";tSec=tPreset;tRunning=true;startTI();renderTimer();}
function closeTimer(){document.getElementById("timerOverlay").style.display="none";clearInterval(tInterval);}
function setPreset(s){tPreset=s;tSec=s;tRunning=true;clearInterval(tInterval);startTI();document.querySelectorAll(".tp").forEach(b=>{b.className="tp"+(parseInt(b.textContent)===s?" on":"");});renderTimer();}
function toggleTimer(){tRunning=!tRunning;if(tRunning)startTI();else clearInterval(tInterval);document.getElementById("tctrl").textContent=tRunning?"暫停":"繼續";}
function startTI(){clearInterval(tInterval);tInterval=setInterval(()=>{if(tSec>0){tSec--;renderTimer();}else{clearInterval(tInterval);tRunning=false;document.getElementById("tctrl").textContent="繼續";}},1000);}
function renderTimer(){const pct=tSec/tPreset;document.getElementById("tarc").style.strokeDashoffset=CIRC*(1-pct);const el=document.getElementById("tnum");el.textContent=tSec===0?"GO!":tSec;el.className="tnum"+(tSec===0?" go":"");}

// ─────────────── HIIT TIMER ───────────────
const HIIT_WORK=40,HIIT_REST=20,HIIT_ROUNDS=3,HIIT_ROUND_REST=90;
const HIIT_CIRC=2*Math.PI*68;
let hiitExs=[],hiitPhase="countdown",hiitSec=5,hiitExIdx=0,hiitRound=1,hiitRunning=false,hiitInterval=null;

function openHiit(secIdx){
  const w=WD[activeDay];
  const sec=w.s[secIdx];
  hiitExs=sec.exs.map(e=>e.n);
  hiitPhase="countdown";hiitSec=5;hiitExIdx=0;hiitRound=1;hiitRunning=true;
  document.getElementById("hiitOverlay").style.display="flex";
  renderHiitDots();
  renderHiit();
  startHiitInterval();
}

function closeHiit(){document.getElementById("hiitOverlay").style.display="none";clearInterval(hiitInterval);}

function toggleHiit(){
  hiitRunning=!hiitRunning;
  if(hiitRunning)startHiitInterval();else clearInterval(hiitInterval);
  document.getElementById("hiitCtrl").textContent=hiitRunning?"暫停":"繼續";
}

function startHiitInterval(){
  clearInterval(hiitInterval);
  hiitInterval=setInterval(()=>{
    if(hiitSec>1){hiitSec--;renderHiit();return;}
    // advance phase
    if(hiitPhase==="countdown"){hiitPhase="work";hiitSec=HIIT_WORK;}
    else if(hiitPhase==="work"){
      if(hiitExIdx<hiitExs.length-1){hiitPhase="rest";hiitSec=HIIT_REST;}
      else{
        // end of round
        if(hiitRound<HIIT_ROUNDS){hiitPhase="roundrest";hiitSec=HIIT_ROUND_REST;}
        else{hiitPhase="done";clearInterval(hiitInterval);renderHiit();return;}
      }
    }
    else if(hiitPhase==="rest"){hiitExIdx++;hiitPhase="work";hiitSec=HIIT_WORK;}
    else if(hiitPhase==="roundrest"){hiitRound++;hiitExIdx=0;hiitPhase="work";hiitSec=HIIT_WORK;}
    renderHiit();
    renderHiitDots();
  },1000);
}

function renderHiitDots(){
  document.getElementById("hiitDots").innerHTML=hiitExs.map((_,i)=>{
    const cls=i<hiitExIdx?"done":i===hiitExIdx?"current":"";
    return`<div class="hiit-dot ${cls}"></div>`;
  }).join("");
}

function renderHiit(){
  const phaseEl=document.getElementById("hiitPhase");
  const nameEl=document.getElementById("hiitExName");
  const nextEl=document.getElementById("hiitNext");
  const numEl=document.getElementById("hiitNum");
  const arcEl=document.getElementById("hiitArc");
  const roundEl=document.getElementById("hiitRoundInfo");

  let phaseTxt,phaseClass,total,nameText,nextText="";
  if(hiitPhase==="countdown"){phaseTxt="準備";phaseClass="";nameText="準備開始";total=5;nextText=`即將開始：${hiitExs[0]}`;}
  else if(hiitPhase==="work"){phaseTxt="動作";phaseClass="work";nameText=hiitExs[hiitExIdx];total=HIIT_WORK;
    const ni=hiitExIdx+1<hiitExs.length?`下一個：${hiitExs[hiitExIdx+1]}`:"最後一個！";nextText=ni;}
  else if(hiitPhase==="rest"){phaseTxt="休息";phaseClass="rest";nameText="休息 💧";total=HIIT_REST;nextText=`下一個：${hiitExs[hiitExIdx+1]||""}`;}
  else if(hiitPhase==="roundrest"){phaseTxt="輪間休息";phaseClass="rest";nameText=`第 ${hiitRound} 輪完成！`;total=HIIT_ROUND_REST;nextText=`準備第 ${hiitRound+1} 輪`;}
  else if(hiitPhase==="done"){phaseTxt="完成！";phaseClass="work";nameText="🔥 太棒了！";total=1;nextText="記得收操伸展";}

  phaseEl.textContent=phaseTxt;
  phaseEl.className="hiit-phase"+(phaseClass?" "+phaseClass:"");
  nameEl.textContent=nameText;
  nextEl.textContent=nextText;
  numEl.textContent=hiitSec;
  numEl.style.color=phaseClass==="work"?"#ff6b35":phaseClass==="rest"?"#4ecdc4":"#f0f0f0";
  arcEl.style.stroke=phaseClass==="work"?"#ff6b35":"#4ecdc4";
  arcEl.style.strokeDashoffset=HIIT_CIRC*(1-hiitSec/Math.max(total,1));
  roundEl.textContent=`第 ${hiitRound} 輪 / 共 ${HIIT_ROUNDS} 輪`;
}

// ─────────────── HISTORY & RECORDS ───────────────
function renderHistory(){
  const el=document.getElementById("histContent");
  const dates=Object.keys(history).sort((a,b)=>b.localeCompare(a));
  if(dates.length===0){
    el.innerHTML=`<div class="hist-empty">還沒有訓練紀錄<br><span style="font-size:11px;margin-top:8px;display:block">完成訓練後會自動記錄在這裡</span></div>`;
    return;
  }

  // Build heatmap for last 10 weeks (70 days)
  const today=new Date();
  const cells=[];
  for(let i=69;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    cells.push(d.toISOString().split("T")[0]);
  }
  // day-of-week labels
  const dowLabels=["日","一","二","三","四","五","六"];
  let heatHtml=`<div class="hist-month-title">訓練熱力圖</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">${dowLabels.map(d=>`<div style="font-size:9px;color:var(--muted);text-align:center;font-family:'DM Mono',monospace">${d}</div>`).join("")}</div>
  <div class="heatmap">`;
  // pad start
  const firstDow=new Date(cells[0]).getDay();
  for(let i=0;i<firstDow;i++)heatHtml+=`<div class="hm-cell" style="opacity:0"></div>`;
  cells.forEach(dk=>{
    const isToday=dk===today.toISOString().split("T")[0];
    const hasData=!!history[dk];
    heatHtml+=`<div class="hm-cell${hasData?" has-data":""}${isToday?" today-cell":""}" onclick="scrollToDay('${dk}')" title="${dk}"></div>`;
  });
  heatHtml+=`</div>`;

  // Day entries
  let entriesHtml="";
  dates.forEach(dk=>{
    const rec=history[dk];
    const w=WD[rec.dayKey];
    if(!w)return;
    const dateObj=new Date(dk+"T00:00:00");
    const dateStr=`${dateObj.getMonth()+1}/${dateObj.getDate()} (${["日","一","二","三","四","五","六"][dateObj.getDay()]})`;
    let exRows="";
    w.s.forEach((sec,si)=>{
      if(sec.t==="h")return;
      sec.exs.forEach((ex,ei)=>{
        const key=`${rec.dayKey}-${si}-${ei}`;
        const done=rec.exProgress[key];
        if(!done)return;
        const total=parseTotalSets(ex.s);
        exRows+=`<div class="hist-ex-row">
          <span class="hist-ex-name">${ex.n}</span>
          <span class="hist-ex-sets">${done}/${total} 組</span>
        </div>`;
      });
    });
    entriesHtml+=`<div class="hist-day-detail" id="histday-${dk}">
      <div class="hist-day-title">
        <span>${w.e} ${w.title} · ${dateStr}</span>
        <span class="hist-day-badge">${w.m} min</span>
      </div>
      ${exRows||'<div style="font-size:12px;color:var(--muted)">無詳細紀錄</div>'}
    </div>`;
  });

  el.innerHTML=heatHtml+entriesHtml;
}

function scrollToDay(dk){
  const el=document.getElementById(`histday-${dk}`);
  if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
}
